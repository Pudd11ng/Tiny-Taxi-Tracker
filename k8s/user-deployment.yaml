# ══════════════════════════════════════════════════════════
# User Service — Deployment + Service
#
# Interview talking points:
#   - 2 replicas: K8s load-balances across pods automatically
#     via the ClusterIP Service (round-robin by default).
#   - Readiness probe: checks both DB and Redis connectivity.
#     If either is down, K8s removes the pod from the Service
#     endpoints — no traffic goes to unhealthy pods.
#   - Service discovery: other pods reach this via
#     http://user-service.app-system.svc.cluster.local:8081
#     or simply http://user-service:8081 (within same namespace)
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: app-system
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:latest
          imagePullPolicy: Never  # Use local image (kind/minikube)
          ports:
            - containerPort: 8081
          env:
            - name: HTTP_PORT
              value: ":8081"
            - name: DATABASE_URL
              value: "postgres://taxi:taxi@postgres:5432/taxi_tracker?sslmode=disable"
            - name: REDIS_ADDR
              value: "redis:6379"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: app-system
  labels:
    app: user-service
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
