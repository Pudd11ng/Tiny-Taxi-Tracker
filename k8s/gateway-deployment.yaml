# ══════════════════════════════════════════════════════════
# API Gateway — Deployment + Service
#
# Interview talking points:
#   - 2 replicas: for high availability. If one pod crashes,
#     K8s routes traffic to the surviving pod.
#   - ClusterIP: only reachable from within the cluster.
#     External traffic comes through Ingress → this Service.
#   - Resource limits: prevent a single pod from consuming
#     all node resources (important in multi-tenant clusters).
# ══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: app-system
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: Never  # Use local image (kind/minikube)
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PORT
              value: ":8080"
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8082"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: app-system
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
