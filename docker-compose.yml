# ══════════════════════════════════════════════════════════
# Docker Compose — Local Development
# Runs the full distributed system locally (pre-Kubernetes)
#
# Usage:
#   docker compose up --build
#
# Test:
#   curl http://localhost/api/users
#   curl -X POST http://localhost/api/users -d '{"name":"test","email":"test@example.com"}'
#   curl -X POST http://localhost/api/orders -d '{"user_id":"user-ali","item":"Roti","quantity":1,"price":5.0}'
# ══════════════════════════════════════════════════════════

services:

  # ── NGINX — Entry Point (simulates K8s Ingress) ────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - app-net

  # ── API Gateway ────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      HTTP_PORT: ":8080"
      USER_SERVICE_URL: "http://user-service:8081"
      ORDER_SERVICE_URL: "http://order-service:8082"
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - app-net

  # ── User Service ───────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    environment:
      HTTP_PORT: ":8081"
      DATABASE_URL: "postgres://taxi:taxi@postgres:5432/taxi_tracker?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  # ── Order Service ──────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    environment:
      HTTP_PORT: ":8082"
      DATABASE_URL: "postgres://taxi:taxi@postgres:5432/taxi_tracker?sslmode=disable"
      USER_SERVICE_URL: "http://user-service:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi
      POSTGRES_DB: taxi_tracker
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi_tracker"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  app-net:
    driver: bridge

volumes:
  pgdata:
