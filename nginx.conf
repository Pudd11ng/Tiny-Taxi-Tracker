events {
    worker_connections 1024;
}

http {
    # ── Upstream: API Gateway ────────────────────────────
    # NGINX acts as the entry point (simulates K8s Ingress Controller).
    # All /api/* requests are forwarded to the API Gateway.
    upstream gateway_backend {
        server gateway:8080;
    }

    server {
        listen 80;
        server_name api.local;

        # Route all API requests through the gateway
        location /api/ {
            proxy_pass         http://gateway_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts for inter-service communication
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
            proxy_send_timeout     30s;
        }

        # Gateway health check (not proxied through /api)
        location /healthz {
            proxy_pass http://gateway_backend;
        }

        # Root — return service info
        location / {
            proxy_pass http://gateway_backend;
        }
    }
}
